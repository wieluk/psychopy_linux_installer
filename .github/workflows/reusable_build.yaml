name: reusable build workflow

on:
  workflow_call:
  workflow_dispatch:

jobs:
  build:
    runs-on: [self-hosted, "${{ matrix.os }}"]
    strategy:
      matrix:
        os:
          - ubuntu-24
          - ubuntu-22
          - ubuntu-20
          - debian-12
          - debian-11
          - fedora-39
          - fedora-40
          - fedora-41
          - pop-22
          - rocky-9
          - centos-9
          - manjarolinux-25
          - opensuse-leap-15
          - linuxmint-22
        python_version: ["3.8", "3.9", "3.10"]
      fail-fast: false
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup environment and dependencies
        run: |
          sudo rm -rf /tmp_dir
          sudo mkdir /tmp_dir
          sudo chown -R $USER:$(id -gn $USER) /tmp_dir

          if command -v apt-get > /dev/null; then
            sudo apt-get update && sudo apt-get install -y jq curl
            PKG_MANAGER="apt-get"
          elif command -v pacman > /dev/null; then
            sudo pacman -Syu --noconfirm jq curl
            PKG_MANAGER="pacman"
          elif command -v dnf > /dev/null; then
            sudo dnf makecache -q && sudo dnf install -y jq curl
            PKG_MANAGER="dnf"
          elif command -v yum > /dev/null; then
            sudo yum makecache -q && sudo yum install -y jq curl
            PKG_MANAGER="yum"
          elif command -v zypper > /dev/null; then
            sudo zypper refresh
            sudo zypper install -y jq curl
            PKG_MANAGER="zypper"
          else
            echo "Unsupported package manager"
            exit 1
          fi
          echo "PKG_MANAGER=$PKG_MANAGER" >> $GITHUB_ENV

      - name: Extract versions
        id: extract_versions
        run: |
          INSTALLER_VERSION=$(grep -m1 '^# *Version:' psychopy_linux_installer | sed 's/^# *Version: *//')
          WXPYTHON_VERSION=$(grep -m1 '^\s*\[WXPYTHON_VERSION\]' psychopy_linux_installer | sed -n 's/.*="\([^"]*\)".*/\1/p')
          
          if [ -z "$INSTALLER_VERSION" ] || [ -z "$WXPYTHON_VERSION" ]; then
            exit 1
          fi
          
          echo "INSTALLER_VERSION=$INSTALLER_VERSION" >> $GITHUB_ENV
          echo "WXPYTHON_VERSION=$WXPYTHON_VERSION" >> $GITHUB_ENV
          
          # Set OS and Python version variables
          PYTHON_MAJOR=$(echo "${{ matrix.python_version }}" | cut -d. -f1)
          PYTHON_MINOR=$(echo "${{ matrix.python_version }}" | cut -d. -f2)
          PROCESSOR_STRUCTURE=$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m)

          # Function to detect the OS version
          detect_os_version() {
              if [ -f /etc/os-release ]; then
                  . /etc/os-release
                  if [ -n "$ID" ] && [ -n "$VERSION_ID" ]; then
                      major_version=$(echo "$VERSION_ID" | cut -d. -f1)
                      echo "$ID-$major_version"
                      return
                  fi
              fi

              if command -v lsb_release > /dev/null 2>&1; then
                  version=$(lsb_release -sr | cut -d. -f1)
                  echo "$(lsb_release -si)-$version"
                  return
              fi

              log_message "Warning: Unable to detect OS version."
              exit 1
          }

          OS_VERSION=$(detect_os_version | tr '[:upper:]' '[:lower:]')
          
          WXPYTHON_WHEEL_NAME="wxPython-${WXPYTHON_VERSION}-cp${PYTHON_MAJOR}${PYTHON_MINOR}-cp${PYTHON_MAJOR}${PYTHON_MINOR}-${PROCESSOR_STRUCTURE}-${OS_VERSION}.whl"
          
          echo "PROCESSOR_STRUCTURE=${PROCESSOR_STRUCTURE}" >> $GITHUB_ENV
          echo "OS_VERSION=${OS_VERSION}" >> $GITHUB_ENV
          echo "PYTHON_VERSION=${{ matrix.python_version }}" >> $GITHUB_ENV
          echo "WXPYTHON_WHEEL_NAME=${WXPYTHON_WHEEL_NAME}" >> $GITHUB_ENV

      - name: Get release info
        id: get_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_TAG="v${INSTALLER_VERSION}"
          API_URL="https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}"
          RESPONSE=$(curl -s -H "Authorization: token $GITHUB_TOKEN" "$API_URL")
          RELEASE_ID=$(echo "$RESPONSE" | jq -r '.id')
          UPLOAD_URL=$(echo "$RESPONSE" | jq -r '.upload_url' | sed 's/{?name,label}//')
          
          if [ "$RELEASE_ID" == "null" ] || [ -z "$RELEASE_ID" ]; then
            exit 1
          fi
          
          echo "release_id=$RELEASE_ID" >> $GITHUB_ENV
          echo "upload_url=$UPLOAD_URL" >> $GITHUB_ENV

      - name: Check wheel availability
        id: check-wheel
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check current release for wheel
          ASSETS=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/${release_id}/assets")
          
          # Check if wheel exists in current release
          WHEEL_EXISTS=$(echo "$ASSETS" | jq -r --arg name "${WXPYTHON_WHEEL_NAME}" '.[] | select(.name == $name) | .id')
          
          # If wheel exists in current release, no need to build
          if [ ! -z "$WHEEL_EXISTS" ]; then
            echo "SKIP_BUILD=true" >> $GITHUB_ENV
            exit 0
          fi
          
          # Check previous release for wheel
          RELEASES=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases")
          
          PREVIOUS_RELEASE_ID=$(echo "$RELEASES" | jq -r "
            map(select(.tag_name != \"v${INSTALLER_VERSION}\"))
            | sort_by(.created_at)
            | reverse
            | .[0].id
          ")
          
          if [ ! -z "$PREVIOUS_RELEASE_ID" ] && [ "$PREVIOUS_RELEASE_ID" != "null" ]; then
            PREVIOUS_ASSETS=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/${PREVIOUS_RELEASE_ID}/assets")
            
            WHEEL_URL=$(echo "$PREVIOUS_ASSETS" | jq -r --arg name "${WXPYTHON_WHEEL_NAME}" \
              '.[] | select(.name == $name) | .browser_download_url')
            
            if [ ! -z "$WHEEL_URL" ] && [ "$WHEEL_URL" != "null" ]; then
              echo "TRANSFER_FROM_PREVIOUS=true" >> $GITHUB_ENV
              echo "WHEEL_URL=$WHEEL_URL" >> $GITHUB_ENV
              exit 0
            fi
          fi
          
          # Need to build the wheel
          echo "SKIP_BUILD=false" >> $GITHUB_ENV
          echo "TRANSFER_FROM_PREVIOUS=false" >> $GITHUB_ENV

      - name: Transfer wheel from previous release
        if: env.TRANSFER_FROM_PREVIOUS == 'true'
        run: |
          curl -L -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/octet-stream" \
            -o "/tmp_dir/${WXPYTHON_WHEEL_NAME}" \
            "${{ env.WHEEL_URL }}"
          
          curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @"/tmp_dir/${WXPYTHON_WHEEL_NAME}" \
            "${{ env.upload_url }}?name=${WXPYTHON_WHEEL_NAME}"

      - name: Install build dependencies
        if: env.SKIP_BUILD == 'false' && env.TRANSFER_FROM_PREVIOUS == 'false'
        run: |
          # Install pyenv dependencies
          case "$PKG_MANAGER" in
              apt-get)
                  sudo apt-get install -y build-essential libssl-dev zlib1g-dev libbz2-dev libreadline-dev libsqlite3-dev curl libncursesw5-dev xz-utils tk-dev libxml2-dev libxmlsec1-dev libffi-dev liblzma-dev git
                  ;;
              dnf|yum)
                  sudo $PKG_MANAGER install -y make gcc zlib-devel bzip2 bzip2-devel readline-devel sqlite sqlite-devel openssl-devel xz xz-devel libffi-devel findutils git
                  ;;
              pacman)
                  sudo pacman -S --noconfirm base-devel openssl zlib xz git bzip2 libffi readline sqlite
                  ;;
              zypper)
                  sudo zypper install -y gcc automake bzip2 libbz2-devel xz xz-devel openssl-devel ncurses-devel readline-devel zlib-devel tk-devel libffi-devel sqlite3-devel git
                  ;;
          esac
          
          # Install wxPython build dependencies
          case "$PKG_MANAGER" in
              apt-get)
                  sudo apt-get install -y freeglut3-dev g++ gstreamer1.0-plugins-base gstreamer1.0-tools \
                  gstreamer1.0-x libgtk2.0-dev libjpeg-dev libnotify-dev libpng-dev libsm-dev libtiff-dev make
                  ;;
              dnf|yum)
                  sudo $PKG_MANAGER install -y freeglut-devel gcc-c++ gstreamer1-devel gtk2-devel \
                  libSM-devel libjpeg-devel libjpeg-turbo-devel libnotify-devel libpng-devel \
                  libtiff-devel make glib2-devel
                  ;;
              pacman)
                  sudo pacman -S --noconfirm freeglut gcc glib2 gstreamer gtk2 libjpeg libpng libsm \
                  libtiff make mesa
                  ;;
              zypper)
                  sudo zypper install -y freeglut-devel gcc-c++ glib2-devel gstreamer-plugins-base \
                  libSM-devel libjpeg-turbo libnotify-devel libpng16-devel make libtiff-devel
                  ;;
          esac

      - name: Setup Python and build wxPython
        if: env.SKIP_BUILD == 'false' && env.TRANSFER_FROM_PREVIOUS == 'false'
        run: |
          # Install pyenv
          curl -L https://github.com/pyenv/pyenv-installer/raw/master/bin/pyenv-installer | bash
          
          export PYENV_ROOT="$HOME/.pyenv"
          export PATH="$PYENV_ROOT/bin:$PATH"
          eval "$(pyenv init --path)"
          eval "$(pyenv init -)"
          
          # Install Python
          PYTHON_CONFIGURE_OPTS="--enable-optimizations" pyenv install $PYTHON_VERSION
          pyenv global $PYTHON_VERSION
          
          # Create virtual environment
          python -m venv /tmp_dir/psychopy_venv
          source /tmp_dir/psychopy_venv/bin/activate
          
          # Install prerequisites
          pip install -U pip distro sip six psychtoolbox setuptools wheel
          
          if [[ "$PYTHON_VERSION" == "3.8" || "$PYTHON_VERSION" == "3.9" ]]; then
              pip install attrdict
          elif [[ "$PYTHON_VERSION" == "3.10" ]]; then
              pip install attrdict3
          fi
          
          # Download and extract wxPython
          mkdir -p /tmp_dir/wxpython && cd /tmp_dir/wxpython
          pip download wxPython==$WXPYTHON_VERSION
          WXPYTHON_TARBALL=$(ls [Ww][Xx][Pp][Yy][Tt][Hh][Oo][Nn]-*.tar.gz)
          tar -xzf "$WXPYTHON_TARBALL"
          WXPYTHON_DIR=$(find . -maxdepth 1 -type d -iname "wxPython-*")
          cd "$WXPYTHON_DIR"
          
          # Build wheel
          python -m pip wheel .
          WXPYTHON_WHEEL=$(ls [Ww][Xx][Pp][Yy][Tt][Hh][Oo][Nn]-*.whl)
          
          # Ensure correct naming
          if [[ "$WXPYTHON_WHEEL" != wxPython-* ]]; then
              NEW_WXPYTHON_WHEEL="wxPython-${WXPYTHON_WHEEL:9}"
              mv "$WXPYTHON_WHEEL" "$NEW_WXPYTHON_WHEEL"
              WXPYTHON_WHEEL="$NEW_WXPYTHON_WHEEL"
          fi
          
          # Copy to destination
          cp "$WXPYTHON_WHEEL" "/tmp_dir/${WXPYTHON_WHEEL_NAME}"

      - name: Upload wxPython wheel
        if: env.SKIP_BUILD == 'false' && env.TRANSFER_FROM_PREVIOUS == 'false'
        run: |
          curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @"/tmp_dir/${WXPYTHON_WHEEL_NAME}" \
            "${{ env.upload_url }}?name=${WXPYTHON_WHEEL_NAME}"

      - name: Cleanup
        if: always()
        run: |
          sudo rm -rf /tmp_dir
